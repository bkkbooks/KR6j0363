body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯我今依瑜伽金剛頂經説寶部虛空藏菩薩真言教法為愍念在家山家薄福少德乏少資具者所求世間出世間勝願多不遂意若依此教法修行業報等障皆悉消除福德增長心神適悅淨信大乘利樂有情心無退轉世出世間所有財寶悉皆獲得於一切衆生能作利益一稱一念所得福聚尚猶虛空何況作意如法修行所願必獲殊勝成就行者先應入灌頂道場親對師前受得儀軌或於山間靜處或於寺舍隨所樂處建立精室作一方壇隨其大小以瞿摩夷塗地作八曼茶羅周匝懸幡上安天蓋於壇西面安虛空藏菩薩像持誦者壇東對像念誦以種種時華散於壇上燒香燈明飲食果子隨力所辦以為供養每入道場對尊像前五體投地禮一切如來及諸聖衆即懺悔隨喜勸請發願已然後結跏趺坐或半跏隨意而坐端身正念當以塗香用塗二手虛心合掌如未敷蓮華誦清淨真言三遍或七遍頂上散印則三業清淨以成勝義澡浴淨三業真言曰唵舜入第耨戍引馱曩引耶娑囉二合引賀引次結佛部心三昧耶印以止觀十度內相叉作拳以禪智並竪結印成已觀想諸佛遍滿虛空即誦佛部心真言三遍頂上散印真言曰唵爾曩爾迦半音娑嚩二合引賀引次結蓮華部心三昧耶印準前佛部心印智度屈入掌直竪禪度結此契已想於一切如來右邊有觀自在菩薩并諸眷屬印誦蓮華部心真言三遍頂上右散印真言曰唵阿去引嚧引力迦半音娑嚩二合引賀引次結金剛部心三昧耶印準前佛部心印以禪度屈入掌直竪智度想於一切如來左邊有金剛手菩薩并諸眷屬即誦金剛部心真言三遍頂左散印真言曰唵嚩日囉二合地力二合迦半音娑嚩二合引賀次結被甲護身印以觀羽禪度橫於掌內以進忍戒檀四度握拳結此契成印身五處所謂印額右肩左肩心喉是名五處護身真言曰唵步引入嚩二合羅吽引由結此印加持五處即成被金剛光焰堅固甲胄一切諸魔不能障難所持真言速得成就次結請虛空藏菩薩印二羽金剛縛直竪忍願反蹙如寶形進力各屈如鉤想於壇中有寶樓閣於樓閣內有八葉開敷蓮華誦真言四遍以進力向身招之本尊并及眷屬皆來集會迎請真言曰唵薩嚩怛他去誐哆引毗囇引迦嚩日囉二合囉怛曩二合薩嚩引舍引跛哩布囉迦弱吽鑁斛引怛囕二合引次結軍吒利身印以檀慧右押左相叉入掌以戒方並押交上以禪智並押戒方以忍願直竪頭相拄進力屈如鉤作三股杵形即誦軍吒利真言隨誦以印左旋三匝辟除一切諸魔右轉三匝便成結界真言曰曩謨囉怛曩二合怛囉二合夜引耶娜莫室戰二合拏摩賀嚩日囉二合矩嚕二合引馱引耶唵戶魯戶魯底瑟姹二合底瑟姹二合滿馱滿馱賀曩賀曩阿密哩二合帝吽發吒娑嚩二合引賀引次獻遏伽水行者常於壇上近膝置二淨器滿盛香水以為遏伽初迎請時獻右邊者後奉送時獻左邊者每奉獻時二羽捧遏伽器當額奉獻即誦真言想浴本尊及諸聖衆真言曰唵嚩日囉二合娜迦吽次結獻蓮華座印以二羽虛心合掌以檀慧禪智各頭相著餘中間六度微屈頭相離猶如開敷蓮華葉形真言曰唵迦麼攞娑嚩二合賀引由結此印真言加持一切聖衆并及本尊皆得七寶蓮華為座次結大虛空藏普通供養印以二羽合掌以戒方二度外縛以進力反蹙如寶形結成契已誦真言四遍普供養真言曰唵誐誐曩三去婆去嚩引嚩日囉二合斛引想從印出生無量種種供養香花燈燭塗香飲食寶幢幡蓋即於本尊及一切聖衆前則成就真實廣大供養次結羯磨印以止羽當心仰掌以智力相捻反屈力度如寶形以觀羽仰掌向前作施願勢結此契已作是思惟我身即同虛空藏菩薩即誦羯磨真言曰唵嚩日囉二合囉怛弩二合引鼻聲憾由作此觀加持故行者自身即等同本尊虛空藏菩薩次結三昧耶印以二羽金剛縛進力反蹙如寶形禪智並竪置於當心即誦三昧耶真言七遍真言曰唵嚩日囉二合囉怛曩二合吽即取水精念珠安於掌中合掌當心誦加持念珠真言三遍真言曰唵尾嚧引左曩麼攞娑嚩二合賀引則捧珠安於頂上發是願言十方世界所有修真言行者彼所受持一切真言願速成就即止羽承珠觀羽當心移珠不緩不急心離散亂或千或百限數畢已捧珠頂戴又發是願一切有情所希望世出世間殊勝果報以我念誦福力速令成就即安珠於本處復結本尊三昧耶印誦三昧耶真言七遍頂上散印又結普供養印誦普通供養真言七遍頂上散印誦虛空藏菩薩讚歎曰嚩日囉二合囉怛曩二合素上嚩日囉二合囉他二合一嚩日囉二合引迦引捨摩賀引麼柅二阿去引迦引捨婆去嚩日囉二合茶馱夜反三嚩日囉二合婆去曩謨引窣堵二合帝四誦讚歎已即取左邊閼伽當額奉獻即結前軍吒利印左旋一匝解界次結三昧耶印奉送一切聖衆奉送真言曰唵嚩日囉二合囉怛曩二合穆舉印安頂上誦真言七遍即成奉送一切聖衆復結三部心三昧耶各誦三遍次結護身印如前印於五處即禮佛發願隨意出道場轉讀大乘印佛印塔廣行檀施常須饒益一切有情
